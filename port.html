<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylvia's Portfolio</title>
    <style>
        /* General Body Styling */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Container */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
        }

        /* Background Image Styling */
        .container::before {
            content: "";
            background: url('1713978451762.jpeg') no-repeat center center/cover; /* Replace 'your-image.jpg' with the path to your image */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 160%;
            z-index: -30;
            filter: brightness(0.4); /* Darkens the image slightly for contrast */
        }
        #imgi{
    width: 30px; 
    height: 30px;
    top: 33px;
    border-radius: 50%;
    left: 115px;}
        /* Main Content Styling */
        .content {
            position: absolute;
            top: 50%;
            left: 70%;
            transform: translate(-50%, -50%);
            max-width: 2000px;
        }

        /* Headline Styling */
        h1 {
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
        }

        /* Paragraph Styling */
        p {
            margin: 20px 0;
            font-size: 1.2rem;
        }

        /* Hire Me Button */
        .hire-btn {
            background-color: #ff0000;
            border: none;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .hire-btn:hover {
            background-color: #cc0000;
        }

        /* Additional Info Section */
        .details {
            margin-top: 30px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .details a {
            color: #ff0000;
            text-decoration: none;
            font-weight: bold;
        }

        .details a:hover {
            text-decoration: underline;
        }

        /* Social Media Links */
        .social-links {
            margin-top: 20px;
        }

        .social-links a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
            font-size: 1.5rem;
        }

        .social-links a:hover {
            color: #ff0000;
        }
        .title-case {
            text-transform: capitalize;}
        </style>
    
</head>
<body>
    <div class="container">
        <!-- Content Area -->
        <div class="content">
            <h1>Hi, I'm Sylvia</h1>
            <p class="title-case">frontend and mobile apps software developer</p>
            <button class="hire-btn">Hire Me</button>

            <div class="details">
                
                <p>I'm a frontend and mobile apps developer based in Nairobi  Kenya.</p>
                <p>Looking for a developer to build your brand and grow your business? Let's partner.</p>
                <a href="#" class="cv-link">Download CV</a>
            </div>

            <div class="social-links">
                <p fontweight:bold >Reachout on:</p>
                <a href="https://LinkedIn.com"><img src="OIP (2).jpeg" id="imgi"></a>
                <a href="https://Instagram.com"><img src="OIP (3).jpeg" id="imgi"></a>
                <a href="https://whatsapp.com"><img src="OIP (4).jpeg" id="imgi"></a>
            </div>
        </div>
    </div>
</body>
</html>
